name: Refresh on-chain snapshot

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Refresh Aave on-chain snapshot
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: npx tsx scripts/onchain-multichain.ts --out public/data/onchain.json

      - name: Refresh Morpho on-chain snapshot
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: npx tsx scripts/onchain-morpho.ts --out public/data/morpho-onchain.json

      - name: Refresh Spark on-chain snapshot
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: npx tsx scripts/onchain-spark.ts --out public/data/spark-onchain.json

      - name: Refresh Fluid on-chain snapshot
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: npx tsx scripts/onchain-fluid.ts --out public/data/fluid-onchain.json

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          FILES="public/data/onchain.json public/data/morpho-onchain.json public/data/spark-onchain.json public/data/fluid-onchain.json"
          if git diff --quiet $FILES; then
            echo "No changes to commit"
            exit 0
          fi
          git add $FILES
          git commit -m "chore: refresh on-chain snapshots $(date -u +%Y-%m-%d)"
          git push
